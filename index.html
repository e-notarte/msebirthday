<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinner Invitation</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#fff5f5;
    margin:0;
    overflow:hidden;
}

.page{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.active{
    display:flex;
}

h1{
    color:#ff4d6d;
}

button{
    padding:12px 25px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.yes{
    background:#4CAF50;
    color:white;
}

.no{
    background:#ff4d4d;
    color:white;
    position:absolute;
}

.next{
    background:#2196F3;
    color:white;
}

select{
    padding:10px;
    margin:10px;
    font-size:16px;
}

.food-option{
    margin:8px;
    padding:10px;
}

.confetti{
    font-size:50px;
    animation: pop 1s infinite alternate;
}

@keyframes pop{
    from{transform:translateY(0);}
    to{transform:translateY(-15px);}
}
</style>
</head>
<body>

<!-- PAGE 1 -->
<div class="page active" id="page1">
    <h1>Will you invite us on a dinner?</h1>

    <div>
        <button class="yes" onclick="nextPage(2)">Yes</button>
        <button class="no" id="noBtn">No</button>
    </div>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
    <h1>Yes, you agreed! 😊</h1>

    <div class="confetti">
        🎉 🎊 🎉 🎊 🎉
    </div>

    <button class="next" onclick="nextPage(3)">Next</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
    <h1>So when will you plan to go out?</h1>

    <select id="month">
        <option>January</option>
        <option>February</option>
        <option>March</option>
        <option>April</option>
        <option>May</option>
        <option>June</option>
        <option>July</option>
        <option>August</option>
        <option>September</option>
        <option>October</option>
        <option>November</option>
        <option>December</option>
    </select>

    <select id="day">
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        <option>6</option>
        <option>7</option>
        <option>8</option>
        <option>9</option>
        <option>10</option>
        <option>11</option>
        <option>12</option>
        <option>13</option>
        <option>14</option>
        <option>15</option>
        <option>16</option>
        <option>17</option>
        <option>18</option>
        <option>19</option>
        <option>20</option>
        <option>21</option>
        <option>22</option>
        <option>23</option>
        <option>24</option>
        <option>25</option>
        <option>26</option>
        <option>27</option>
        <option>28</option>
        <option>29</option>
        <option>30</option>
        <option>31</option>
    </select>

    <br>

    <select id="time">
        <option>5:00 PM</option>
        <option>6:00 PM</option>
        <option>7:00 PM</option>
        <option>8:00 PM</option>
        <option>9:00 PM</option>
    </select>

    <button class="next" onclick="nextPage(4)">Next</button>
</div>

<!-- PAGE 4 -->
<div class="page" id="page4">
    <h1>What are we eating?</h1>

    <label class="food-option">
        <input type="radio" name="food" value="Pizza"> Pizza 🍕
    </label>

    <label class="food-option">
        <input type="radio" name="food" value="Burger"> Burger 🍔
    </label>

    <label class="food-option">
        <input type="radio" name="food" value="Steak"> Steak 🥩
    </label>

    <label class="food-option">
        <input type="radio" name="food" value="Sushi"> Sushi 🍣
    </label>

    <label class="food-option">
        <input type="radio" name="food" value="Pasta"> Pasta 🍝
    </label>

    <label class="food-option">
        <input type="radio" name="food" value="Samgyupsal"> Samgyupsal 🥓
    </label>

    <button class="next" onclick="showSummary()">Finish</button>
</div>

<!-- PAGE 5 -->
<div class="page" id="page5">
    <h1>🎉 Dinner Plan Confirmed 🎉</h1>

    <p id="summary"></p>
</div>

<script>
function nextPage(page){
    document.querySelectorAll('.page').forEach(p=>{
        p.classList.remove('active');
    });

    document.getElementById('page'+page).classList.add('active');
}

const noBtn = document.getElementById('noBtn');

document.addEventListener('mousemove', function(){
    let x = Math.random() * (window.innerWidth - 120);
    let y = Math.random() * (window.innerHeight - 80);

    noBtn.addEventListener('mouseover', ()=>{
        noBtn.style.left = x + 'px';
        noBtn.style.top = y + 'px';
    });
});

function showSummary(){

    let month = document.getElementById("month").value;
    let day = document.getElementById("day").value;
    let time = document.getElementById("time").value;

    let food = document.querySelector('input[name="food"]:checked');

    let selectedFood = food ? food.value : "No food selected";

    document.getElementById("summary").innerHTML =
    `
    📅 Date: ${month} ${day}<br><br>
    ⏰ Time: ${time}<br><br>
    🍽️ Food: ${selectedFood}
    `;

    nextPage(5);
}
</script>

</body>
</html>
